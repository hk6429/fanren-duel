<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>凡人煉心訣 · 七訣鬥法</title>
<style>
:root{--bg:#0d0f12;--bg2:#15181d;--ink:#e8e2d4;--dim:#a59f8f;--line:#2a2e35;
 --gold:#c9a24a;--jade:#6fae8e;--red:#c25b4e;--purp:#9a7fc0;--blue:#5b8fc2;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
 font-family:"Noto Serif TC","Songti TC","STSong",serif;user-select:none;-webkit-user-select:none;}
#app{height:100%;display:flex;flex-direction:column;
 background:radial-gradient(ellipse at 50% 0%,#1a1d24 0%,var(--bg) 60%);}
button{font-family:inherit;color:var(--ink);background:var(--bg2);border:1px solid var(--line);
 border-radius:10px;cursor:pointer;}
button:active{background:#1d2026;border-color:var(--gold);transform:scale(.97);}
/* ── 直式提醒 ── */
#rotate{position:fixed;inset:0;z-index:99;background:var(--bg);display:none;
 flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--dim);font-size:18px;}
#rotate .ico{font-size:52px;animation:rot 2s ease-in-out infinite;}
@keyframes rot{0%,20%{transform:rotate(0)}60%,100%{transform:rotate(90deg)}}
@media (orientation:portrait){#rotate{display:flex;}}
/* ── 通用畫面 ── */
.screen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;
 gap:18px;padding:20px;overflow:hidden;}
.screen.on{display:flex;}
h1{font-size:34px;color:var(--gold);letter-spacing:8px;text-shadow:0 0 24px rgba(201,162,74,.35);}
.sub{color:var(--dim);font-size:14px;letter-spacing:2px;}
.bigbtn{font-size:20px;padding:16px 44px;min-height:64px;letter-spacing:4px;}
.bigbtn.gold{border-color:var(--gold);color:var(--gold);}
.row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
/* ── 入口 ── */
#gate{position:relative;padding:0;}
#gate .gbg{position:absolute;inset:0;background-size:cover;background-position:center 30%;
 opacity:.55;animation:gzoom 14s ease-in-out infinite alternate;}
@keyframes gzoom{from{transform:scale(1)}to{transform:scale(1.08)}}
#gate::after{content:'';position:absolute;inset:0;
 background:linear-gradient(180deg,rgba(13,15,18,.25) 0%,rgba(13,15,18,.55) 55%,rgba(13,15,18,.92) 100%);}
#gate .gin{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:16px;}
#gate h1{font-size:52px;letter-spacing:14px;}
#gate .enter{font-size:22px;padding:16px 60px;letter-spacing:10px;border-color:var(--gold);color:var(--gold);
 background:rgba(13,15,18,.6);animation:qiglow 1.4s ease-in-out infinite alternate;}
/* ── 模式圖卡 ── */
.mcards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.mcard{position:relative;width:216px;aspect-ratio:16/11;border:1px solid var(--line);border-radius:14px;
 overflow:hidden;background:var(--bg2);cursor:pointer;padding:0;}
.mcard img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.72;transition:.25s;}
.mcard:active img{opacity:.95;transform:scale(1.04);}
.mcard .lb{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:8px 6px 7px;text-align:center;
 background:linear-gradient(180deg,transparent,rgba(13,15,18,.94) 45%);font-size:18px;letter-spacing:3px;color:var(--ink);}
.mcard .lb small{display:block;font-size:11px;color:var(--dim);letter-spacing:1px;margin-top:2px;}
.mcard.gold{border-color:var(--gold);}
.mcard.gold .lb{color:var(--gold);}
/* ── 選角 ── */
#pickGrid{display:grid;grid-template-columns:repeat(5,minmax(96px,130px));gap:10px;justify-content:center;}
.pcard{position:relative;border:1px solid var(--line);border-radius:12px;overflow:hidden;
 background:var(--bg2);cursor:pointer;aspect-ratio:3/4;}
.pcard img{width:100%;height:100%;object-fit:cover;display:block;}
.pcard .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
 font-size:26px;letter-spacing:2px;writing-mode:vertical-rl;color:var(--dim);}
.pcard .nm{position:absolute;left:0;right:0;bottom:0;padding:5px 0;text-align:center;font-size:14px;
 background:rgba(13,15,18,.82);letter-spacing:2px;}
.pcard.villain .nm{color:#d98b80;}
.pcard.sel{outline:3px solid var(--gold);box-shadow:0 0 18px rgba(201,162,74,.5);}
.pcard.sel2{outline:3px solid var(--blue);box-shadow:0 0 18px rgba(91,143,194,.5);}
.pcard.locked img{filter:grayscale(1) brightness(.28);}
.pcard.locked .nm{color:var(--dim);}
.pcard.locked::after{content:'🔒 戰勝解鎖';position:absolute;top:10px;left:0;right:0;
 text-align:center;font-size:12px;color:var(--gold);letter-spacing:1px;text-shadow:1px 1px 0 #000;}
/* ── 戰場 ── */
#battle{display:none;flex:1;flex-direction:column;}
#battle.on{display:flex;}
.half{flex:1;display:flex;flex-direction:column;padding:8px 12px;position:relative;overflow:hidden;
 border-bottom:1px solid var(--line);min-height:0;min-width:0;}
.half:last-child{border-bottom:none;}
.half.flip{transform:rotate(180deg);}
/* 左右並肩模式：兩半直排改橫排，皆正向 */
#battle.lr{flex-direction:row-reverse;} /* half1 在右、half0 在左 */
#battle.lr .half{border-bottom:none;border-left:1px solid var(--line);}
#battle.lr .half:last-child{border-left:none;}
#battle.lr .qtext{font-size:19px;}
#battle.lr .qopts{grid-template-columns:1fr;} /* 半寬版面改單欄，選項不擠 */
#battle.lr .qopt{font-size:17px;min-height:56px;}
/* 左右模式＝格鬥對峙：只留己方立繪、靠中線面對面（half0=左、half1=右）
   答題區讓出內側 30%，立繪整條直立完整可見 */
#battle.lr .fig{height:88%;width:36%;bottom:0;aspect-ratio:auto;object-fit:contain;
 object-position:bottom center;-webkit-mask-image:none;mask-image:none;}
#battle.lr .fig.nostand{width:auto;height:56%;aspect-ratio:3/4;object-fit:cover;
 -webkit-mask-image:radial-gradient(ellipse 62% 58% at 50% 62%,#000 38%,transparent 74%);
 mask-image:radial-gradient(ellipse 62% 58% at 50% 62%,#000 38%,transparent 74%);}
#battle.lr .half.bot .qarea,#battle.lr .half.bot .acts,#battle.lr .half.bot .wait{margin-right:35%;}
#battle.lr .half.top .qarea,#battle.lr .half.top .acts,#battle.lr .half.top .wait{margin-left:35%;}
#battle.lr .fig.foe{display:none;}
#battle.lr .half.bot .fig.me{left:auto;right:-6%;}
#battle.lr .half.top .fig.me{left:-6%;right:auto;transform:scaleX(-1);}
#battle.lr .acts{grid-template-columns:1fr;}
#battle.lr .cutin .mvname{font-size:30px;}
#battle.lr .cutin.ult .mvname{font-size:36px;}
/* 1P 模式：沿用左右分屏，右半為電腦陣營 */
#battle.solo .half.top .wait{font-size:17px;}
/* 立繪駐場：己方左、對手右，水墨暈邊融入背景 */
.figs{position:absolute;inset:0;z-index:0;pointer-events:none;}
.fig{position:absolute;bottom:1%;height:72%;aspect-ratio:3/4;object-fit:cover;opacity:.95;
 -webkit-mask-image:radial-gradient(ellipse 66% 68% at 50% 52%,#000 52%,transparent 92%);
 mask-image:radial-gradient(ellipse 66% 68% at 50% 52%,#000 52%,transparent 92%);}
.fig.nostand{-webkit-mask-image:radial-gradient(ellipse 60% 58% at 50% 48%,#000 50%,transparent 84%);
 mask-image:radial-gradient(ellipse 60% 58% at 50% 48%,#000 50%,transparent 84%);}
.fig.me{left:0;}
.fig.foe{right:0;transform:scaleX(-1);}
.hud,.qarea,.acts,.wait{position:relative;z-index:1;}
.hud{display:flex;align-items:center;gap:10px;flex:0 0 auto;}
.hud .face{width:52px;height:52px;border-radius:10px;object-fit:cover;border:1px solid var(--line);background:var(--bg2);}
.hud .facetxt{width:52px;height:52px;border-radius:10px;border:1px solid var(--line);background:var(--bg2);
 display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--dim);letter-spacing:1px;}
.hud .col{flex:1;min-width:0;}
.hud .nm{font-size:18px;letter-spacing:2px;}
.hud .nm .st{font-size:13px;color:var(--dim);margin-left:8px;}
.bar{height:13px;border-radius:7px;background:#101216;border:1px solid var(--line);overflow:hidden;margin-top:3px;position:relative;}
.bar .fill{height:100%;border-radius:7px;transition:width .5s cubic-bezier(.2,.8,.3,1);}
.bar.hp .fill{background:linear-gradient(90deg,#7fae6f,var(--jade));}
.bar.hp.low .fill{background:linear-gradient(90deg,#a8493d,var(--red));}
.bar.qi{height:9px;}
.bar.qi .fill{background:linear-gradient(90deg,#8a6a2c,var(--gold));box-shadow:0 0 8px rgba(201,162,74,.6);}
.bar.qi.full{border-color:var(--gold);animation:qiglow 1s ease-in-out infinite alternate;}
@keyframes qiglow{from{box-shadow:0 0 4px rgba(201,162,74,.4)}to{box-shadow:0 0 14px rgba(201,162,74,.95)}}
.bar .num{position:absolute;right:5px;top:-1px;font-size:10px;color:var(--ink);text-shadow:0 0 3px #000;}
.buff{font-size:11px;color:var(--purp);height:14px;}
/* 題目區 */
.qarea{flex:1;display:flex;flex-direction:column;justify-content:center;gap:8px;min-height:0;}
.qtext{font-size:21px;line-height:1.5;text-align:center;padding:2px 6px;}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qopt{min-height:64px;font-size:19px;padding:10px 12px;line-height:1.35;}
.qopt.dead{opacity:.4;pointer-events:none;}
.qopt.right{border-color:var(--jade);color:var(--jade);}
.qopt.wrong{border-color:var(--red);color:var(--red);}
.msg{text-align:center;font-size:16px;color:var(--dim);min-height:38px;line-height:1.4;padding:0 8px;position:relative;z-index:1;}
.msg .tag{color:var(--gold);}
/* 行動選單 */
.acts{display:none;grid-template-columns:1fr 1fr;gap:10px;flex:1;align-content:center;}
.acts.on{display:grid;}
.act{min-height:70px;font-size:20px;letter-spacing:2px;line-height:1.3;}
.act small{display:block;font-size:13px;color:var(--dim);letter-spacing:0;}
.act.ult{border-color:var(--gold);color:var(--gold);}
.act.ult:disabled{opacity:.35;color:var(--dim);border-color:var(--line);}
.act.charge{border-color:var(--blue);}
/* 等待 / AI 狀態 */
.wait{flex:1;display:flex;align-items:center;justify-content:center;color:var(--dim);
 font-size:18px;letter-spacing:3px;text-align:center;line-height:1.6;}
/* ── 特寫演出 ── */
.cutin{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
 background:rgba(8,9,11,.93);overflow:hidden;}
.cutin.on{display:flex;animation:cutfade .25s;}
@keyframes cutfade{from{opacity:0}to{opacity:1}}
.cutin img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.92;
 animation:cutzoom 1.4s ease-out forwards;}
@keyframes cutzoom{from{transform:scale(1.12)}to{transform:scale(1.0)}}
.cutin .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
 font-size:44px;letter-spacing:10px;color:var(--gold);opacity:.25;writing-mode:vertical-rl;}
.cutin .slash{position:absolute;left:-20%;right:-20%;top:50%;height:3px;background:#fff;
 box-shadow:0 0 24px #fff;transform:rotate(-14deg) scaleX(0);animation:slash .5s .45s forwards;}
@keyframes slash{to{transform:rotate(-14deg) scaleX(1)}}
.cutin .mvname{position:relative;z-index:2;font-size:42px;letter-spacing:6px;color:var(--ink);
 text-shadow:0 0 20px rgba(201,162,74,.9),3px 3px 0 #000;transform:skewX(-8deg) scale(0);
 animation:mvpop .45s .2s cubic-bezier(.2,1.6,.4,1) forwards;white-space:nowrap;}
@keyframes mvpop{to{transform:skewX(-8deg) scale(1)}}
.cutin.ult .mvname{font-size:52px;color:var(--gold);}
.cutin.ult::after{content:'';position:absolute;inset:0;
 background:radial-gradient(circle,rgba(201,162,74,.35) 0%,transparent 65%);
 animation:ultburst 2.2s ease-out;}
@keyframes ultburst{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
.speedlines{position:absolute;inset:0;background:repeating-linear-gradient(
 -14deg,transparent 0 26px,rgba(232,226,212,.05) 26px 28px);}
/* 震屏 / 傷害數字 */
.shake{animation:shk .4s;}
@keyframes shk{0%,100%{transform:translate(0)}20%{transform:translate(-7px,4px)}40%{transform:translate(6px,-5px)}
 60%{transform:translate(-5px,3px)}80%{transform:translate(4px,-2px)}}
.half.flip.shake{animation:shkf .4s;}
@keyframes shkf{0%,100%{transform:rotate(180deg)}20%{transform:rotate(180deg) translate(-7px,4px)}
 40%{transform:rotate(180deg) translate(6px,-5px)}60%{transform:rotate(180deg) translate(-5px,3px)}
 80%{transform:rotate(180deg) translate(4px,-2px)}}
.dmgpop{position:absolute;z-index:30;font-size:34px;color:var(--red);font-weight:700;
 text-shadow:2px 2px 0 #000;animation:dmgf 1s forwards;pointer-events:none;}
.dmgpop.heal{color:var(--jade);}
@keyframes dmgf{0%{opacity:0;transform:translateY(8px) scale(.6)}25%{opacity:1;transform:translateY(0) scale(1.15)}
 100%{opacity:0;transform:translateY(-26px) scale(1)}}
/* 結算 */
#result{position:relative;}
#result .rbg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center 28%;
 opacity:.55;animation:gzoom 12s ease-in-out infinite alternate;}
#result .rbg::after{content:'';position:absolute;inset:0;
 background:linear-gradient(180deg,rgba(13,15,18,.30) 0%,rgba(13,15,18,.62) 55%,rgba(13,15,18,.94) 100%);}
#result>*{position:relative;z-index:1;}
#result .win{font-size:48px;color:var(--gold);letter-spacing:8px;text-shadow:0 0 28px rgba(201,162,74,.55),2px 2px 0 #000;}
#result.lose .win{color:var(--red);text-shadow:0 0 28px rgba(194,91,78,.6),2px 2px 0 #000;}
#result.lose .rbg{filter:grayscale(.45) brightness(.8);}
.badges{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.badge{font-size:15px;color:var(--gold);border:1px solid var(--gold);border-radius:999px;
 padding:5px 16px;background:rgba(13,15,18,.72);letter-spacing:1px;}
.badge.grey{color:var(--dim);border-color:var(--line);}
#result .quote{max-width:520px;text-align:center;color:var(--dim);line-height:1.8;font-size:15px;}
.statline{font-size:14px;color:var(--dim);}
/* 靜音鈕 */
#mute{position:fixed;right:10px;top:10px;z-index:50;width:42px;height:42px;border-radius:50%;
 font-size:18px;opacity:.7;}
/* ── 開場影片 ── */
#intro{position:fixed;inset:0;z-index:99;background:#000;display:flex;
 align-items:center;justify-content:center;cursor:pointer;
 transition:opacity .6s;}
#intro.out{opacity:0;pointer-events:none;}
#intro video{width:100%;height:100%;object-fit:contain;} /* contain：影片完整不裁切 */
.introskip{position:absolute;right:18px;bottom:14px;color:rgba(232,226,212,.55);
 font-size:13px;letter-spacing:2px;border:1px solid rgba(232,226,212,.25);
 border-radius:20px;padding:6px 14px;}
</style>
</head>
<body>
<div id="rotate"><div class="ico">📱</div>請將平板轉為<b style="color:var(--gold)">橫向</b>再開戰</div>
<button id="mute" onclick="Snd.toggle()">🔊</button>
<div id="app">

<!-- 入口 -->
<!-- 開場影片：播完（或輕觸跳過）回到入口 -->
<div id="intro" onclick="endIntro()">
  <video id="introVid" src="video/intro.mp4" autoplay muted playsinline preload="auto"
    onended="endIntro()" onerror="endIntro()"></video>
  <div class="introskip">輕觸跳過 ▸</div>
</div>

<div class="screen on" id="gate">
  <div class="gbg" style="background-image:url('img/cutin/xiaoyi_ult.jpg')"></div>
  <div class="gin">
    <h1>七訣鬥法</h1>
    <div class="sub">凡人煉心訣 · 番外對戰篇 —— 答七習慣之題，出江湖之招</div>
    <button class="enter" onclick="enterGame()">入 陣</button>
    <div class="sub" style="font-size:12px">零帳號 · 零上傳 · 答對才能出招，集氣放大絕</div>
  </div>
</div>

<!-- 模式選擇 -->
<div class="screen" id="home">
  <h1 style="font-size:26px;letter-spacing:6px;">選擇對戰模式</h1>
  <div class="sub" id="rankLine"></div>
  <div class="mcards" id="modeRow">
    <button class="mcard gold" onclick="startPick('2p',null,'tb')">
      <img src="img/cutin/murongyan_ult.jpg" alt="" onerror="this.remove()">
      <span class="lb">🔃 雙人 · 面對面<small>上下鏡射 · 平板平放桌面</small></span>
    </button>
    <button class="mcard gold" onclick="startPick('2p',null,'lr')">
      <img src="img/cutin/shenmu_ult.jpg" alt="" onerror="this.remove()">
      <span class="lb">↔️ 雙人 · 並肩<small>左右分屏 · 同向而坐</small></span>
    </button>
    <button class="mcard" onclick="pickDiff('1p')">
      <img src="img/cutin/xuemo_ult.jpg" alt="" onerror="this.remove()">
      <span class="lb">🤖 挑戰電腦<small>簡單 / 中等 / 困難</small></span>
    </button>
    <button class="mcard" onclick="pickDiff('gt')">
      <img src="img/cutin/licanglan_ult.jpg" alt="" onerror="this.remove()">
      <span class="lb">⛰️ 闖關擂臺<small>一條命連破五關 · 場間三選一恩賜</small></span>
    </button>
  </div>
  <div class="mcards" id="diffRow" style="display:none">
    <button class="mcard" onclick="startPick(diffMode,'easy')">
      <img src="img/chars/shangyu.jpg" alt="" onerror="this.remove()">
      <span class="lb">簡單<small>電腦答對率低 · 出手慢</small></span>
    </button>
    <button class="mcard" onclick="startPick(diffMode,'mid')">
      <img src="img/chars/xueshashi.jpg" alt="" onerror="this.remove()">
      <span class="lb">中等<small>勢均力敵</small></span>
    </button>
    <button class="mcard" onclick="startPick(diffMode,'hard')">
      <img src="img/chars/xuemo.jpg" alt="" onerror="this.remove()">
      <span class="lb">困難<small>神速搶答 · 會留氣放大絕</small></span>
    </button>
  </div>
  <div class="row">
    <button class="bigbtn" id="homeBack" onclick="homeBack()">返 回</button>
  </div>
  <a href="https://fanren-lianxin.vercel.app" style="color:var(--dim);font-size:12px;letter-spacing:1px;text-decoration:none;border-bottom:1px dotted var(--line)">⛰ 回《凡人煉心訣》本傳修行 →</a>
</div>

<!-- 選角 -->
<div class="screen" id="pick">
  <div class="sub" id="pickHint">玩家一 選角（金框）</div>
  <div id="pickGrid"></div>
  <div class="row">
    <button class="bigbtn" onclick="goHome()">返回</button>
    <button class="bigbtn gold" id="fightBtn" onclick="startBattle()" disabled>開 戰</button>
  </div>
</div>

<!-- 戰鬥 -->
<div id="battle">
  <div class="half top" id="half1"></div>
  <div class="half bot" id="half0"></div>
</div>

<!-- 結算 -->
<div class="screen" id="result">
  <div class="rbg" id="resBg"></div>
  <div class="win" id="winTxt"></div>
  <div class="badges" id="resBadges"></div>
  <div class="quote" id="charQuote" style="color:var(--gold)"></div>
  <div class="quote" id="winQuote"></div>
  <div class="statline" id="statTxt"></div>
  <div class="row" id="boonRow" style="display:none"></div>
  <div class="row" id="resRow">
    <button class="bigbtn gold" id="rematchBtn" onclick="rematch()">再戰一場</button>
    <button class="bigbtn" onclick="repick()">換角色</button>
    <button class="bigbtn" onclick="goHome()">回到首頁</button>
  </div>
</div>

</div>
<script src="questions.js"></script>
<script>
/* ═══════════ 角色資料（招式皆出自小說文本）═══════════ */
const ROSTER={
 xiaoyi:{nm:'蕭逸',st:'醉仙劍客',hero:1,
  atk:{n:'醉仙劍·隨手一撩',d:10},
  sp:{n:'忘形劍意',d:16,fx:'burst',hint:'爆發 16 傷'},
  ult:{n:'眾心之劍',d:40}},
 shenmu:{nm:'沈牧',st:'玄冥醫者',hero:1,
  atk:{n:'太素回春掌',d:10},

 init(){if(this.ac||this.muted)return;try{this.ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}

 // 五聲音階（宮商角徵羽）程序化配樂：古箏式撥弦＋低音鼓點

  const fx=kind==='sp'?mv.fx:null;
  const hv=MUT.k==='spring'?12:6;
  if(fx==='heal6'){me.hp=Math.min(100,me.hp+hv);popDmg(side,hv,true);}
  if(fx==='drain6'){me.hp=Math.min(100,me.hp+hv);popDmg(side,hv,true);}
  if(fx==='self4'){me.hp=Math.max(0,me.hp-4);popDmg(side,4,false);}
  if(fx==='steal15'){const s=Math.min(15,op.qi);op.qi-=s;me.qi=Math.min(100,me.qi+s);}
  if(fx==='break20'){op.qi=Math.max(0,op.qi-20);}
  if(fx==='qi12'){me.qi=Math.min(100,me.qi+12);}
  if(fx==='poison'){op.poison=3;}
  if(fx==='weak'){op.weak=true;}
  shakeHalf(1-side);endTurn();});}
function endTurn(){if(checkEnd())return;setTimeout(()=>nextQuestion(),700);}
function aiAct(){if(!G||G.phase!=='act'||G.actor!==1)return;const cfg=AI_CFG[G.diff],me=G.p[1];
 let kind;
 if(me.qi>=100)kind='ult';
 else if(cfg.smart>=1)kind=(G.p[0].hp<=12)?'sp':'charge'; // 困難：留氣放大絕，能斬殺才出手
 else if(Math.random()<.4+cfg.smart*.2)kind=Math.random()<.6?'sp':'atk';
 else kind='charge';
 act(1,kind);}
/* ═══════════ 特寫演出 ═══════════ */
function cutin(side,ch,txt,kind,done){
 const dur=kind==='ult'?2500:kind==='charge'?900:1300;
 const targets=G.mode==='2p'?[0,1]:[0];
 targets.forEach(t=>{
  const host=$('half'+t);const div=document.createElement('div');
  div.className='cutin'+(kind==='ult'?' ult':'');
  const img=kind==='charge'?'':`<img src="img/cutin/${G.p[side].key}_${kind==='ult'?'ult':'atk'}.jpg" onerror="this.remove()">`;
  div.innerHTML=`${img}<div class="fallback">${ch.nm}</div><div class="speedlines"></div>
   <div class="slash"></div><div class="mvname">${txt}</div>`;
  host.appendChild(div);requestAnimationFrame(()=>div.classList.add('on'));
  setTimeout(()=>div.remove(),dur);});
 setTimeout(done,dur*0.72);}
function shakeHalf(side){const h=$('half'+side);h.classList.remove('shake');void h.offsetWidth;h.classList.add('shake');
 setTimeout(()=>h.classList.remove('shake'),450);}
function popDmg(side,n,heal,pre){const h=$('half'+side);const d=document.createElement('div');
 d.className='dmgpop'+(heal?' heal':'');d.textContent=(pre||'')+(heal?'＋':'－')+n;
 d.style.left=(35+Math.random()*30)+'%';d.style.top='38%';
 h.appendChild(d);setTimeout(()=>d.remove(),1000);}
/* ═══════════ 渲染 ═══════════ */
function hudHTML(side){const f=G.p[side],ch=ROSTER[f.key];
 const buffs=[f.poison>0?`☠中毒${f.poison}`:'',f.weak?'🌀被幡縛':'',f.streak>=3?`🔥連對${f.streak}`:''].filter(Boolean).join('　');
 return `<div class="hud">
  <img class="face" src="img/chars/${f.key}.jpg" onerror="this.outerHTML='<div class=facetxt>${ch.nm}</div>'">
  <div class="col"><div class="nm">${ch.nm}<span class="st">${ch.st}</span></div>
   <div class="bar hp${f.hp<=30?' low':''}"><div class="fill" style="width:${f.hp}%"></div><span class="num">${f.hp}</span></div>
   <div class="bar qi${f.qi>=100?' full':''}"><div class="fill" style="width:${f.qi}%"></div></div>
   <div class="buff">${buffs}</div></div></div>`;}
function qHTML(side){const q=G.q;
 return `<div class="qarea"><div class="qtext">${q.text}<span style="color:var(--dim);font-size:12px">（${JUE_NM[q.h]}）</span></div>
  <div class="qopts">${q.c.map((c,i)=>
   `<button class="qopt${G.locked[side]?' dead':''}" data-i="${i}" onclick="answer(${side},${i})">${c.t}</button>`).join('')}</div>
  <div class="msg" id="msg${side}">${G.locked[side]?'':`搶答！答對者得攻擊權 <span style="color:var(--dim)">｜⚡${MUT.n}</span>`}</div></div>`;}
function actHTML(side){const f=G.p[side],ch=ROSTER[f.key];
 return `<div class="acts on">
  <button class="act" onclick="act(${side},'atk')">👊 ${ch.atk.n}<small>傷害 ${ch.atk.d}＋集氣 12</small></button>
  <button class="act" onclick="act(${side},'sp')">✨ ${ch.sp.n}<small>${ch.sp.hint}</small></button>
  <button class="act charge" onclick="act(${side},'charge')">🌀 集氣<small>氣＋50（兩次集滿）</small></button>
  <button class="act ult" onclick="act(${side},'ult')" ${f.qi>=100?'':'disabled'}>🔥 ${ch.ult.n}<small>大絕 · 傷害 ${ch.ult.d}（需集滿氣）</small></button>
 </div>`;}
function figIMG(cls,key){return `<img class="fig ${cls}" src="img/stand/${key}.jpg" `+
 `onerror="this.onerror=()=>this.remove();this.src='img/chars/${key}.jpg';this.classList.add('nostand')">`;}
function figsHTML(side){return `<div class="figs">${figIMG('me',G.p[side].key)}${figIMG('foe',G.p[1-side].key)}</div>`;}
function renderAll(){if(!G)return;
 [0,1].forEach(s=>{const h=$('half'+s);let body='';
  if(solo(G.mode)&&s===1){ // 電腦陣營（右半）
   body=figsHTML(1)+hudHTML(1)+`<div class="wait">${
    G.phase==='q'?'🤖 對手思索中……':
    G.phase==='act'?(G.actor===1?'🤖 對手獲得攻擊權！':'被搶答——接招！'):''}</div>`;
   h.innerHTML=body;return;}
  if(G.phase==='q')body=figsHTML(s)+hudHTML(s)+(G.q?qHTML(s):'');
  else if(G.phase==='act')body=figsHTML(s)+hudHTML(s)+(G.actor===s?actHTML(s):
   `<div class="wait">${ROSTER[G.p[1-s].key].nm} 答對，正在選招——<br>穩住道心，接招！</div>`);
  else body=figsHTML(s)+hudHTML(s)+`<div class="wait"></div>`;
  h.innerHTML=body;});
 // 雙方殘血 → BGM 加速（絕境張力）
 if(Snd.tracks&&Snd.tracks.battle){const hot=G.p[0].hp>0&&G.p[1].hp>0&&G.p[0].hp<=30&&G.p[1].hp<=30;
  try{Snd.tracks.battle.playbackRate=hot?1.12:1;}catch(e){}}}
function setMsg(side,html){const m=$('msg'+side);if(m)m.innerHTML=html;}
/* ═══════════ 勝負 ═══════════ */
function checkEnd(){if(!G)return false;const dead=G.p.findIndex(f=>f.hp<=0);
 if(dead<0)return false;
 const w=1-dead,wf=G.p[w],ch=ROSTER[wf.key];
 clearTimeout(G.aiTimer);Snd.play('win');
 const lose1p=solo(G.mode)&&dead===0; // 人機類模式玩家落敗
 $('resBg').style.backgroundImage=`url('img/cutin/${wf.key}_ult.jpg')`;
 $('result').classList.toggle('lose',lose1p);
 $('winTxt').textContent=lose1p?`敗於 ${ch.nm}`:`${ch.nm} 勝`;
 // ── 八角迴圈：絕處逢生／連勝／解鎖／段位 ──
 const badges=[];let rTxt='再戰一場';let midRun=false;
 if(wf.hp<=15)badges.push('⚡ 絕處逢生');
 if(G.mode==='gt'){
  if(dead===1){ // 攻克本關
   const pw=Store.get('duel_pwins',0)+1;Store.set('duel_pwins',pw);
   const vk=G.p[1].key,u=Store.get('duel_unlock',{});
   if(!u[vk]){u[vk]=1;Store.set('duel_unlock',u);badges.push(`🔓 解鎖新角色：${ROSTER[vk].nm}`);}
   Run.stage++;Run.hp=wf.hp;Run.qi=wf.qi;
   const best=Store.get('duel_gt_best',0);
   if(Run.stage>best){Store.set('duel_gt_best',Run.stage);badges.push(`📜 最佳紀錄：${Run.stage} 關`);}
   if(Run.stage>=Run.order.length){
    $('winTxt').textContent=`${ch.nm} 五關全破`;
    badges.push('🏆 擂臺通關！');Run=null;rTxt='再闖一輪';
   }else{
    midRun=true;
    $('winTxt').textContent=`第 ${Run.stage} 關 攻克`;
    badges.push(`⛰️ 下一關（${Run.stage+1}/${Run.order.length}）：${ROSTER[Run.order[Run.stage]].nm}——選一枚恩賜再上`);
   }
  }else{
   badges.push(`⛰️ 止步第 ${Run?Run.stage+1:1} 關`);
   Run=null;rTxt='再闖一輪';
  }}
 else if(G.mode==='1p'){
  if(dead===1){ // 玩家獲勝
   const ws=Store.get('duel_wstreak',0)+1;Store.set('duel_wstreak',ws);
   const pw=Store.get('duel_pwins',0)+1;Store.set('duel_pwins',pw);
   if(ws>=2){badges.push(`🔥 ${ws} 連勝`);rTxt='守住連勝，再戰！';}
   const vk=G.p[1].key;
   if(!ROSTER[vk].hero){const u=Store.get('duel_unlock',{});
    if(!u[vk]){u[vk]=1;Store.set('duel_unlock',u);badges.push(`🔓 解鎖新角色：${ROSTER[vk].nm}`);}}
   const ri=rankInfo(pw);
   badges.push(ri.next?`段位 ${ri.cur[1]} ｜ 再 ${ri.next[0]-pw} 勝晉升 ${ri.next[1]}`
    :`段位 ${ri.cur[1]}（登峰造極）`);
  }else{
   const ws=Store.get('duel_wstreak',0);
   if(ws>=2)badges.push(`💔 ${ws} 連勝中斷`);
   Store.set('duel_wstreak',0);rTxt='雪恥再戰';
  }}
 $('resBadges').innerHTML=badges.map(b=>`<span class="badge">${b}</span>`).join('');
 $('rematchBtn').textContent=rTxt;
 $('boonRow').style.display=midRun?'flex':'none';
 $('resRow').style.display=midRun?'none':'flex';
 if(midRun)$('boonRow').innerHTML=BOONS.map((b,i)=>
  `<button class="bigbtn gold" onclick="pickBoon(${i})">${b.ic} ${b.n}<br><small style="font-size:12px;color:var(--dim)">${b.d}</small></button>`).join('');
 const cq=QUOTES[wf.key];
 $('charQuote').textContent=cq?`「${cq.w}」——${ch.nm}`:'';
 $('winQuote').textContent=WIN_QUOTES[Math.floor(Math.random()*WIN_QUOTES.length)];
 const st=G.p.map((f,i)=>{const tot=f.stats.right+f.stats.wrong;
  return `${ROSTER[f.key].nm}：答對 ${f.stats.right}/${tot}，最高連對 ${f.stats.maxStreak}`;}).join('　｜　');
 $('statTxt').textContent=st;
 try{const rec=JSON.parse(localStorage.getItem('duel_stats')||'{}');
  rec[wf.key]=(rec[wf.key]||0)+1;localStorage.setItem('duel_stats',JSON.stringify(rec));}catch(e){}
 const lastPick=pickState;G=null;
 setTimeout(()=>show('result'),900);
 pickState=lastPick;return true;}
function rematch(){const ps=pickState;if(!ps)return goHome();
 if(ps.mode==='gt'){Run=null;return startBattle();} // 再闖一輪：重排關卡
 if(ps.mode==='1p'){ // 一鍵再戰：自動輪替下一個未解鎖反派，推進收服
  const vil=Object.keys(ROSTER).filter(x=>!ROSTER[x].hero&&x!==ps.sel[0]);
  const lockedV=vil.filter(x=>!unlocked(x));
  const pool=lockedV.length?lockedV:vil;
  ps.sel[1]=pool[Math.floor(Math.random()*pool.length)];}
 startBattle();}
function repick(){const ps=pickState;if(ps)startPick(ps.mode,ps.diff,ps.layout);else goHome();}
</script>
